name: Combine PRs

on:
  schedule:
    - cron: '0 17 * * 5' # Friday at 17:00 (UTC)
  workflow_dispatch: # allows you to manually trigger the workflow

# The minimum permissions required to run this Action
permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  combine-prs:
    runs-on: ubuntu-latest

    steps:
      - name: combine-prs
        id: combine-prs
        uses: github/combine-prs@v5.2.0
        with:
          branch_prefix: dependabot
          must_be_green: true
          combine_branch_name: combine-prs-branch
          labels: dependencies, engProd
