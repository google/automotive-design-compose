name: Combine PRs

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to combine PRs into'
        required: true
        default: 'combined-prs'
      labels:
        description: 'Comma-separated labels to filter PRs (currently only single label supported with script)'
        required: false
        default: 'combine'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: read

jobs:
  combine:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: audit

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v3.5.2
        with:
          submodules: 'recursive'

      - name: Combine PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET_BRANCH="${{ github.event.inputs.branch }}"
          LABEL="${{ github.event.inputs.labels }}"
          
          echo "Target Branch: $TARGET_BRANCH"
          echo "Label: $LABEL"
          
          # Configure Git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create and checkout target branch from current HEAD (main)
          git checkout -b "$TARGET_BRANCH"
          
          # Fetch PRs with label using gh CLI
          PRS=$(gh pr list --label "$LABEL" --json number,headRefName --jq '.[] | .headRefName')
          
          if [ -z "$PRS" ]; then
            echo "No PRs found with label '$LABEL'"
            exit 0
          fi
          
          echo "Found PR branches to merge:"
          echo "$PRS"
          
          for PR_BRANCH in $PRS; do
            echo "----------------------------------------"
            echo "Attempting to merge '$PR_BRANCH'..."
            
            # Fetch the branch
            git fetch origin "$PR_BRANCH"
            
            # Attempt merge
            if git merge origin/"$PR_BRANCH" --no-edit; then
              echo "Successfully merged '$PR_BRANCH'"
            else
              echo "CONFLICT merging '$PR_BRANCH'. Skipping."
              git merge --abort
            fi
          done
          
          echo "----------------------------------------"
          echo "Pushing combined branch '$TARGET_BRANCH'..."
          git push origin "$TARGET_BRANCH" --force
