<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/thomas-lowry/figma-plugin-ds/dist/figma-plugin-ds.css" />
    <link rel="stylesheet" href="style.css" />
</head>

<div class="page-padding-large" style="display: none">
    <div id="testSliderSection" style="display: none">
        <input id="testSlider" type="range" min="0" max="100" value="50" class="slider" style="margin-left: 8; margin-top: -3;" oninput="sliderChanged();"" onmouseup="sliderReleased();">
    </div>
</div>

<div id="validNodeSection">
    <div id="scalableUIEmptySection" class="page-padding-small">
      <button id="addNodeButton" class="button--primary" style="flex-grow: 1;" onclick="addNode();">Add ScalableUI Data</button>
    </div>

    <div id="scalableUiNodeSection" style="display: none">
        <div class="page-padding-small">
            <label class="boldlabel">Node Type:</label>
            <label id="nodeType" class="normallabel"></label><br>
            <label class="boldlabel">Node Name:</label>
            <label id="nodeName" class="normallabel">Variant Name Here</label>
        </div>

        <div class="page-padding-small">
            <button id="removeNodeButton" class="button--primary" style="flex-grow: 1;" onclick="removeNode();">Remove ScalableUI Data</button>
        </div>
    </div>
</div>

<div id="componentSetSection" style="display: none">
    <!--
    <div id="scalableUIEmptySection" class="page-padding-small">
      <button id="addSetButton" class="button--primary" style="flex-grow: 1;" onclick="addSet();">Add ScalableUI Data</button>
    </div>
    -->
    <div class="page-padding-small">
        <label class="boldlabel">COMPONENT SET:</label>
        <label id="componentSetName" class="normallabel"></label>
    </div>


    <div id="eventSection">
        <div class="page-padding-small">
            <label class="boldlabel">EVENTS:</label>
        </div>
        <div id="componentSetEventsSection" style="margin-left: 16"></div>
        <div id="addEventSection" class="page-padding-small">
        <button id="addEventButton" class="button--primary" style="flex-grow: 1;" onclick="addEventDialog();">Add event</button>
        </div>
    </div>

    <div class="page-padding-small">
        <label class="boldlabel">VARIANTS:</label>
    </div>
    <div id="componentSetVariantsSection" class="page-padding-small">
    </div>
</div>

<div id="invalidNodeSection" style="display: flex; justify-content: center; align-items: center; width: 100%; height: 100%">
Invalid Node Selected
</div>

<dialog id="createEventDialog">
    <p>
        <div style="display: flex; gap: 8px;">
            <label for="createEventNameInput" style="flex-grow: 1;">On Event:</label>
            <input id="createEventNameInput" type="text" id="createEventName" autofocus></input>
        </div>
        <div style="display: flex; gap: 8px; margin-top: 6">
            <label for="createEventSelect" style="flex-grow: 1;">Switch to Variant:</label>
            <select id="createEventSelect"></select>
        </div>
    </p>
    <div style="display: flex; gap: 4px;">
        <button class="button--primary" onclick="createNewEvent();">Create</button>
        <button class="button--primary" onclick="createEventDialog.close()">Cancel</button>
    </div>
</dialog>

<script>
    function addEventDialog() {
        createEventDialog.showModal();
    }

    function createNewEvent() {
        const eventName = createEventNameInput.value;
        const variantId = createEventSelect.value;
        const variantName = createEventSelect.options[createEventSelect.selectedIndex].text;
        createEventDialog.close();

        parent.postMessage({
            pluginMessage: {
                msg: 'createEvent',
                event: eventName,
                variantId: variantId,
                variantName: variantName,
            }
        }, '*');
    }

    function toNumber(str, def) {
        let num = parseInt(str, 10);
        if (isNaN(num)) {
            return def;
        }
        return num;
    }

    function addSet() {
        console.log("TODO");
    }

    function addNode() {
        scalableUIEmptySection.style.display = "none";
        scalableUiNodeSection.style.display = "block";
    }

    function removeNode() {
        scalableUIEmptySection.style.display = "block";
        scalableUiNodeSection.style.display = "none";
        resetvalues();
        parent.postMessage({
            pluginMessage: {
                msg: 'removeNode',
            }
        }, '*');
    }
    
    function onRemoveEvent(name) {
        parent.postMessage({
            pluginMessage: {
                msg: 'removeEvent',
                event: name,
            }
        }, '*');
    }

    function onDefaultChecked(checkbox) {
        const checkedDefaults = document.querySelectorAll('input[type="checkbox"]:checked');
        for (const cb of checkedDefaults) {
            if (cb != checkbox)
                cb.checked = false;
        }
        onVariantChanged();
    }

    function onVariantChanged() {
        console.log("### Variant changed");
        const allLabels = document.querySelectorAll('label');
        const variantLabels = Array.from(allLabels).filter(label => {
            return label.textContent == "VARIANT: "
        });

        const variantList = [];
        for (const vl of variantLabels) {
            const id = vl.id;
            const name = document.getElementById(id + "-name").textContent;
            const isDefault = document.getElementById(id + "-default").checked;
            const leftValue = document.getElementById(id + "-left-value").value;
            const leftDim = document.getElementById(id + "-left-dim").value;
            const topValue = document.getElementById(id + "-top-value").value;
            const topDim = document.getElementById(id + "-top-dim").value;
            const rightValue = document.getElementById(id + "-right-value").value;
            const rightDim = document.getElementById(id + "-right-dim").value;
            const bottomValue = document.getElementById(id + "-bottom-value").value;
            const bottomDim = document.getElementById(id + "-bottom-dim").value;
            variantList.push({
                isDefault: isDefault,
                id,
                name,
                leftValue,
                leftDim,
                topValue,
                topDim,
                rightValue,
                rightDim,
                bottomValue,
                bottomDim,
            });
            console.log("  ### Var " + id + " default " + isDefault + " left " + leftValue + " " + leftDim);
        }

        parent.postMessage({
            pluginMessage: {
                msg: 'nodeChanged',
                variantList: variantList,
            }
        }, '*');
    }

    function sliderChanged() {
        parent.postMessage({
            pluginMessage: {
                msg: 'sliderChanged',
                nodeId: "7:20",
                value: testSlider.value,
            }
        }, '*');
    }

    function sliderReleased() {
        parent.postMessage({
            pluginMessage: {
                msg: 'sliderReleased',
                nodeId: "7:20",
                value: testSlider.value,
            }
        }, '*');
    }

    function selectComponent(name, type, nodeData) {
        eventSection.style.display = "none";
        validNodeSection.style.display = "block";
        invalidNodeSection.style.display = "none";
        componentSetSection.style.display = "none";
        /*
        nodeType.textContent = type;
        nodeName.textContent = name;

        if (nodeData) {
            scalableUIEmptySection.style.display = "none";
            scalableUiNodeSection.style.display = "block";
            positionX.value = nodeData.x;
            positionY.value = nodeData.y;
        } else {
            scalableUIEmptySection.style.display = "block";
            scalableUiNodeSection.style.display = "none";
            resetvalues();
        }
        */
    }

    function selectComponentSet(name, type, setData, variantList) {
        eventSection.style.display = "block";
        validNodeSection.style.display = "none";
        invalidNodeSection.style.display = "none";
        componentSetSection.style.display = "block";

        while (componentSetEventsSection.firstChild) {
            componentSetEventsSection.removeChild(componentSetEventsSection.lastChild);
        }
        if (setData.eventList) {
            for (const event of setData.eventList)
                addEvent(event);
        }

        while (componentSetVariantsSection.firstChild) {
          componentSetVariantsSection.removeChild(componentSetVariantsSection.lastChild);
        }
        while (createEventSelect.firstChild) {
            createEventSelect.removeChild(createEventSelect.lastChild);
        }

        componentSetName.textContent = name;
        for (let child of variantList) {
            addEventSelectOption(child.name, child.id);
            addVariantSection(child.name, child);
        }
    }

    function addEvent(event) {
        const name = event.eventName;
        const variantId = event.variantId;
        const variantName = event.variantName;
        console.log("### Add Event " + name + ", " + variantId + ", " + variantName);
        const eventDiv = document.createElement("div");

        const eventLabel = document.createElement("label");
        eventLabel.classList.add("normallabel");
        eventLabel.textContent = name;
        eventDiv.appendChild(eventLabel);

        const arrowLabel = document.createElement("label");
        arrowLabel.classList.add("boldlabel");
        arrowLabel.textContent = "  ->  ";
        eventDiv.appendChild(arrowLabel);

        const variantLabel = document.createElement("label");
        variantLabel.classList.add("normallabel");
        variantLabel.textContent = variantName;
        eventDiv.appendChild(variantLabel);

        const removeButton = document.createElement("button");
        removeButton.classList.add("button--secondary");
        removeButton.style.flexGrow = 1;
        removeButton.style.marginLeft = 10;
        removeButton.onclick = () => { onRemoveEvent(name); }
        removeButton.textContent = "Remove Event";
        eventDiv.appendChild(removeButton);

        componentSetEventsSection.appendChild(eventDiv);
    }

    function addDimensionInput(name, id, bounds, parent) {
        const value = bounds?.value;
        const dim = bounds?.dim;

        const dimensionDiv = document.createElement("div");
        dimensionDiv.style.marginLeft = 10;
        dimensionDiv.style.display = "flex";
        dimensionDiv.style.alignItems = "center";

        const label = document.createElement("label");
        label.style.width = 60;
        label.classList.add("normallabel");
        label.textContent = name + " ";
        dimensionDiv.appendChild(label);

        const numInput = document.createElement("input");
        numInput.classList.add("input__field");
        numInput.id = id + "-value";
        numInput.type = "number";
        numInput.style = "width: 60";
        numInput.oninput = () => { onVariantChanged(); }
        numInput.value = value;
        dimensionDiv.appendChild(numInput);

        const dimSelect = document.createElement("select");
        dimSelect.id = id + "-dim";
        dimSelect.oninput = () => { onVariantChanged(); }
        const optDp = document.createElement("option");
        optDp.text = "dp";
        optDp.value = "dp";
        dimSelect.appendChild(optDp);
        const optPercent = document.createElement("option");
        optPercent.text = "%";
        optPercent.value = "%";
        dimSelect.appendChild(optPercent);
        dimSelect.value = dim == "dp" ? "dp" : "%";
        dimensionDiv.appendChild(dimSelect);

        parent.appendChild(dimensionDiv);
    }

    function addEventSelectOption(name, id) {
        const variantOption = document.createElement("option");
        variantOption.text = name;
        variantOption.value = id;
        createEventSelect.appendChild(variantOption);
    }

    function addVariantSection(name, variantData) {
        const id = variantData.id;
        const sectionDiv = document.createElement("div");
        sectionDiv.classList.add("page-padding-small");

        // Variant name section
        const nameSection = document.createElement("div");
        const nodeTypeLabel = document.createElement("label");
        nodeTypeLabel.classList.add("boldlabel");
        nodeTypeLabel.textContent = "VARIANT: ";
        nodeTypeLabel.id = id;
        const nodeTypeName = document.createElement("label");
        nodeTypeName.classList.add("normallabel");
        nodeTypeName.textContent = name;
        nodeTypeName.id = id + "-name";
        nameSection.appendChild(nodeTypeLabel);
        nameSection.appendChild(nodeTypeName);
        sectionDiv.appendChild(nameSection);

        // Default option
        const defaultSection = document.createElement("div");
        defaultSection.style.display = "flex";
        defaultSection.style.alignItems = "center";
        const defaultLabel = document.createElement("label");
        defaultLabel.classList.add("boldlabel");
        defaultLabel.textContent = "DEFAULT:";
        defaultSection.appendChild(defaultLabel);
        const defaultCheckbox = document.createElement("input");
        defaultCheckbox.id = id + "-default";
        defaultCheckbox.type = "checkbox";
        defaultCheckbox.onclick = () => { onDefaultChecked(defaultCheckbox); }
        defaultCheckbox.checked = variantData?.isDefault;
        defaultSection.appendChild(defaultCheckbox);
        sectionDiv.appendChild(defaultSection);

        // Variant position data
        const positionSection = document.createElement("div");
        const positionLabel = document.createElement("label");
        positionLabel.classList.add("boldlabel");
        positionLabel.textContent = "POSITION:";
        positionLabel.style.marginRight = 10;
        positionSection.appendChild(positionLabel);
        positionSection.appendChild(document.createElement("div"));

        addDimensionInput("Left", id + "-left", variantData?.bounds?.left, positionSection);
        addDimensionInput("Top", id + "-top", variantData?.bounds?.top, positionSection);
        addDimensionInput("Right", id + "-right", variantData?.bounds?.right, positionSection);
        addDimensionInput("Bottom", id + "-bottom", variantData?.bounds?.bottom, positionSection);
    
        sectionDiv.appendChild(positionSection);

        componentSetVariantsSection.appendChild(sectionDiv);
    }

    function deselectComponent() {
        console.log("### CLEAR");
        eventSection.style.display = "none";
        validNodeSection.style.display = "none";
        componentSetSection.style.display = "none";
        invalidNodeSection.style.display = "flex";
    }

    function resetvalues() {
        positionX.value = 0;
        positionY.value = 0;
    }

    window.onmessage = async function (event) {
        let msg = event.data.pluginMessage;
        if (msg.msg == "scalable-select-component") {
            selectComponent(msg.nodeName, msg.nodeType, msg.nodeData);
        } else if (msg.msg == "scalable-select-component-set") {
            selectComponentSet(msg.nodeName, msg.nodeType, msg.setData, msg.variantList);
        } else if (msg.msg == "scalable-deselect") {
            deselectComponent();
        }
        else if (msg.msg == 'scalable-selection') {
            console.log("### Select: " + msg.nodeId);
            if (msg.nodeId == "7:20") { // Slider bar
                testSliderSection.style.display = "block";
            }
            else {
                testSliderSection.style.display = "none";
            }

            return;
        } else {
            console.log("### Msg " + msg.msg);
        }
    }
</script>
