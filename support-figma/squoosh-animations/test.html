<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Direct Canvas API Test</title>
    <style>
        body { 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        #test-canvas { 
            width: 500px; 
            height: 500px; 
            border: 2px solid green; 
        }
    </style>
</head>
<body>
    <h1>Direct Canvas API Test</h1>
    <canvas id="test-canvas" width="500" height="500"></canvas>

    <script>
        try {
            const canvas = document.getElementById('test-canvas');
            const ctx = canvas.getContext('2d');
            
            if (ctx) {
                // Set the fill color to red
                ctx.fillStyle = 'red';
                
                // Draw a filled rectangle
                // Position (50, 50), Size (200, 200)
                ctx.fillRect(50, 50, 200, 200);
                
                console.log('Successfully drew a rectangle on the canvas.');
            } else {
                console.error('Failed to get 2D rendering context from canvas.');
                alert('Failed to get 2D rendering context.');
            }
        } catch (e) {
            console.error('An error occurred during canvas drawing:', e);
            alert('An error occurred during canvas drawing: ' + e.message);
        }
    </script>
</body>
</html>
