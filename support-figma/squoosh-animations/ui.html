<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/fabric@latest/dist/fabric.js"></script>
<style>
  /* Basic styles for the plugin body and form elements */
  body { font-family: sans-serif; padding: 10px; }
  .row { margin-bottom: 10px; }
  label { display: inline-block; width: 120px; }
  input, select { width: 200px; }
  #keyframes-container { margin-top: 10px; }
  .keyframe { margin-bottom: 5px; display: flex; align-items: center; }
  .keyframe input { width: 100px; }
  .delete-keyframe { margin-left: 10px; cursor: pointer; }
  #warning { color: #d93025; background-color: #fce8e6; border: 1px solid #f5c6cb; padding: 8px; border-radius: 4px; margin-bottom: 10px; display: none; }

  #main-container { 
    display: flex; 
    flex-direction: column; 
    height: 100vh; 
    overflow: hidden; /* Prevent the whole plugin from scrolling */
  }
  #top-panel {
    display: flex;
    flex-direction: column;
    min-height: 100px;
    height: 40%;
  }
  #bottom-panel {
    flex: 1; /* Take up the remaining space */
    overflow-y: auto; /* Make this panel scrollable */
  }
  #resizer {
    height: 5px;
    background-color: #ccc;
    cursor: ns-resize;
  }
  
  /* Container for the timeline canvas and property inspector */
  #timeline-view { 
    flex: 1; 
    padding-bottom: 10px; 
    display: flex;
    flex-direction: column;
  }

  /* Container for the preview panel */
  #preview-panel-container {
    flex: 1; /* Make this fill the top panel */
    min-height: 150px; /* Ensure it doesn't collapse */
    display: flex;
    flex-direction: column;
    padding-bottom: 10px;
    border-bottom: 1px solid #ccc;
  }
  #preview-panel {
    flex-grow: 1;
    background-color: #f8f8f8;
    border: 1px solid #ddd;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  /* This ensures the SVG scales to fit the panel while maintaining its aspect ratio */
  #preview-panel svg {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  #play-button {
    margin-top: 10px;
  }

  #timeline-canvas {
    width: 100%;
    height: 80px; /* Adjust height as needed */
  }
  #timeline-cell {
    padding: 0;
  }
  /* Basic styles for the property inspector */
  #property-inspector {
    flex: 1;
    overflow-y: auto;
    padding-top: 10px;
  }
  .property-group {
    border: 1px solid #ddd;
    border-radius: 3px;
    margin-bottom: 5px;
  }
  .property-group summary {
    padding: 8px;
    background-color: #f5f5f5;
    cursor: pointer;
    outline: none;
  }
  .property-table {
    width: 100%;
    border-collapse: collapse;
  }
  .property-table th, .property-table td {
    border: 1px solid #ddd;
    padding: 6px;
    text-align: left;
    font-size: 12px;
  }
  .property-table th {
    background-color: #f9f9f9;
  }
  .property-table th:first-child,
  .property-table td:first-child {
    width: 120px;
    min-width: 120px;
    max-width: 120px;
  }
  .node-header-row {
    cursor: pointer;
    background-color: #f0f0f0;
    font-weight: bold;
  }
  .node-header-row:hover {
    background-color: #e0e0e0;
  }
  .property-name-cell {
    padding-left: 25px !important;
  }
  .arrow {
    display: inline-block;
    width: 1em;
  }

  /* Styles for the single node editor view */
  #single-node-view {
    padding: 10px;
    border-top: 1px solid #ccc;
  }

  /* Styles for the resize handle */
  #resize-handle {
    position: fixed;
    bottom: 0;
    right: 0;
    width: 10px;
    height: 10px;
    background-color: #ccc;
    cursor: nwse-resize;
    z-index: 100;
  }
  </style>
  </head>
  <body>
  <div id="resize-handle"></div>
  <div id="main-container">
      <div id="top-panel">
          <div id="preview-panel-container">
            <h2 id="preview-label">Animation Preview</h2>
            <h3 id="selection-name-label"></h3>
            <canvas id="preview-canvas"></canvas>
            <button id="play-button" disabled>Play</button>
            <button id="log-data-button">Log Data for Testing</button>
          </div>
      </div>
      <div id="resizer"></div>
      <div id="bottom-panel">
          <div id="timeline-view">
              <div id="property-inspector"></div>
          </div>
      </div>
      <div id="single-node-view">
          <h1 id="node-name">node name</h1>
          <h2>Animation Properties</h2>
        <!-- Placeholder for warnings -->
        <div id="warning"></div>
        <!-- Form for animation properties -->
        <div class="row">
            <label for="animation-override-type">Animation:</label>
            <select id="animation-override-type">
                <option value="Default">No override / Default</option>
                <option value="None">None</option>
                <option value="Custom">Custom</option>
            </select>
        </div>
        <div id="custom-animation-fields" style="display: none;">
            <div class="row">
                <label for="initial-delay">Initial Delay (ms):</label>
                <input type="number" id="initial-delay" value="0">
            </div>
            <div class="row">
                <label for="animation-type">Animation Type:</label>
                <select id="animation-type">
                    <option value="Smooth">Smooth</option>
                    <option value="KeyFrame">KeyFrame</option>
                </select>
            </div>
            <div id="smooth-animation-fields">
                <div class="row">
                    <label for="duration">Duration (ms):</label>
                    <input type="number" id="duration" value="1000">
                </div>
                <div class="row">
                    <label for="easing">Easing:</label>
                    <select id="easing">
                        <option value="Linear">Linear</option>
                        <option value="EaseInOut">Ease In Out</option>
                        <option value="EaseIn">Ease In</option>
                        <option value="EaseOut">Ease Out</option>
                        <option value="Bezier">Custom Bezier</option>
                    </select>
                </div>
                <div id="bezier-fields" style="display: none;">
                    <div class="row"><label for="p1">P1:</label><input type="number" id="p1" value="0.0" step="0.1"></div>
                    <div class="row"><label for="p2">P2:</label><input type="number" id="p2" value="1.0" step="0.1"></div>
                </div>
            </div>
            <div id="keyframe-animation-fields" style="display: none;">
                <div id="keyframes-container"></div>
                <button id="add-keyframe">Add Keyframe</button>
            </div>
            <div class="row">
                <label for="repeat-type">Repeat Type:</label>
                <select id="repeat-type">
                    <option value="NoRepeat">No Repeat</option>
                    <option value="Repeat">Repeat N Times</option>
                    <option value="LoopForever">Loop Forever</option>
                </select>
            </div>
            <div id="repeat-count-fields" style="display: none;">
                <div class="row">
                    <label for="repeat-count">Repeat Count:</label>
                    <input type="number" id="repeat-count" value="1">
                </div>
            </div>
            <div class="row">
                <label for="interrupt-type">Interrupt Type:</label>
                <select id="interrupt-type">
                    <option value="None">None</option>
                    <option value="ResetToStart">Reset To Start</option>
                    <option value="Complete">Complete</option>
                    <option value="Stop">Stop</option>
                </select>
            </div>
        </div>
        <button id="save">Save</button>
        <button id="save-and-close">Save and Close</button>
    </div>
</div>
<!-- This view is shown when multiple nodes are selected -->
<div id="multi-node-view" style="display: none;">
    <h2>Multiple Nodes Selected</h2>
    <div id="node-list"></div>
</div>
<script src="dist/ui.js"></script>
</body>
</html>
